<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UI Prototype — Disputes & Chargebacks | Backbase Banking OS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#0052CC;--blue-light:#F0F6FF;--dark:#091C35;--green:#28A745;--red:#DC3545;--orange:#E65100;--amber:#FFC107;--gray:#666666;--gray-light:#FAFBFC;--gray-border:#E0E0E0;--gray-text:#333333;--white:#FFFFFF;--font:Arial,'Helvetica Neue',sans-serif;--shadow:0 2px 8px rgba(0,0,0,0.1);--shadow-lg:0 10px 40px rgba(0,0,0,0.16)}
body{font-family:var(--font);background:var(--dark);color:var(--gray-text);-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* Top bar */
.top-bar{background:var(--dark);padding:10px 24px;display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.top-bar h1{color:#fff;font-size:15px;font-weight:700;flex:1}
.top-bar .badge{background:rgba(255,255,255,.08);color:var(--amber);padding:3px 10px;border-radius:10px;font-size:10px;font-weight:700}

/* Persona bar */
.persona-bar{padding:8px 24px;text-align:center;flex-shrink:0;transition:background .4s}
.persona-bar.customer{background:linear-gradient(135deg,#003DA0,#0052CC)}
.persona-bar.employee{background:linear-gradient(135deg,#091C35,#1a3050)}
.persona-bar.agent{background:linear-gradient(135deg,#4C1D95,#6B21A8)}
.persona-bar.sentinel{background:linear-gradient(135deg,#92400E,#B45309)}
.pb-row{display:flex;align-items:center;justify-content:center;gap:20px}
.pb-avatar{width:90px;height:90px;border-radius:50%;border:4px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0;background:rgba(255,255,255,.1);overflow:hidden;position:relative;box-shadow:0 6px 24px rgba(0,0,0,.4)}
.pb-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.pb-info{text-align:left}
.pb-name{font-size:24px;font-weight:800;color:#fff;margin-bottom:3px}
.pb-role{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.55)}
.pb-title{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.5px;margin-top:4px;text-align:center}
.pb-subtitle{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;text-align:center}

/* Step counter */
.step-counter{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px;display:flex;align-items:center;justify-content:center;gap:3px}
.sc-dot{width:8px;height:8px;border-radius:50%;transition:all .3s}
.sc-dot.done{background:rgba(255,255,255,.4)}.sc-dot.current{background:#fff;width:20px;border-radius:4px}.sc-dot.pending{background:rgba(255,255,255,.15)}

/* Main screen area — split: screen left, bullets right */
.screen-area{flex:1;display:flex;align-items:center;justify-content:center;padding:16px 24px;overflow:hidden;position:relative}
/* Bullet points panel */
.bullets-panel{position:absolute;right:40px;top:50%;transform:translateY(-50%);width:320px;opacity:0;transition:all .5s .3s;transform:translateY(-50%) translateX(20px)}
.bullets-panel.show{opacity:1;transform:translateY(-50%) translateX(0)}
.bp-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.4);margin-bottom:16px}
.bp-item{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;font-size:15px;color:rgba(255,255,255,.8);line-height:1.5}
.bp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px;box-shadow:0 0 8px currentColor}
.bp-dot.blue{background:var(--blue);color:var(--blue)}.bp-dot.purple{background:#8B2BE2;color:#8B2BE2}.bp-dot.orange{background:var(--amber);color:var(--amber)}.bp-dot.teal{background:#0097A7;color:#0097A7}.bp-dot.green{background:var(--green);color:var(--green)}

/* Screen frame */
.frame{position:absolute;transition:all .5s cubic-bezier(.4,0,.2,1);opacity:0;transform:translateX(60px)}
.frame.from-left{transform:translateX(-60px)}
.frame.active{opacity:1;transform:translateX(0)}
.frame.exit-left{opacity:0;transform:translateX(-60px)}
.frame.exit-right{opacity:0;transform:translateX(60px)}

/* Mobile frame — iPhone 16 form factor (393×852 at ~60% scale) */
.mobile-frame{width:320px;height:580px;background:var(--white);border-radius:44px;box-shadow:0 16px 56px rgba(0,0,0,.35);overflow:hidden;border:6px solid #1a1a1a;display:flex;flex-direction:column;position:relative}
.mobile-frame::before{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:90px;height:24px;background:#1a1a1a;border-radius:14px;z-index:10}
.mobile-status{background:#000;color:#fff;padding:14px 24px 6px;display:flex;justify-content:space-between;font-size:12px;font-weight:600}
.mobile-body{flex:1;overflow-y:auto;scrollbar-width:none}
.mobile-body::-webkit-scrollbar{display:none}
.mobile-bottom{flex-shrink:0}
.mobile-bottom{background:var(--white);border-top:1px solid var(--gray-border);padding:8px 0;display:flex;justify-content:space-around}
.mobile-bottom .nav-item{text-align:center;font-size:8px;color:var(--gray);font-weight:600}
.mobile-bottom .nav-item.active{color:var(--blue)}
.mobile-bottom .nav-ico{font-size:18px;margin-bottom:1px}

/* Desktop frame */
.desktop-frame{width:700px;background:var(--white);border-radius:14px;box-shadow:0 12px 48px rgba(0,0,0,.3);overflow:hidden;border:3px solid #1a1a1a}
.desktop-titlebar{background:#222;padding:8px 14px;display:flex;align-items:center;gap:6px}
.desktop-titlebar .dt-dot{width:10px;height:10px;border-radius:50%}
.desktop-titlebar .dt-r{background:#FF503C}.desktop-titlebar .dt-y{background:#FFAC09}.desktop-titlebar .dt-g{background:#26BC71}
.desktop-titlebar .dt-url{margin-left:12px;background:rgba(255,255,255,.08);border-radius:4px;padding:4px 12px;font-size:11px;color:rgba(255,255,255,.5);flex:1}
.desktop-body{display:flex;max-height:480px}

/* Employee sidebar */
.emp-sb{width:200px;background:var(--white);border-right:1px solid var(--gray-border);padding:10px 0;overflow-y:auto;flex-shrink:0}
.emp-sb .sb-head{padding:8px 14px;font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:1px}
.emp-sb .sb-item{padding:8px 14px;font-size:12px;color:var(--gray);display:flex;align-items:center;gap:8px;cursor:default}
.emp-sb .sb-item.active{background:var(--blue-light);color:var(--blue);font-weight:600;border-left:3px solid var(--blue)}
.emp-sb .sb-item .ico{font-size:13px;width:18px;text-align:center}

/* Employee content */
.emp-ct{flex:1;padding:16px 20px;background:var(--gray-light);overflow-y:auto;max-height:480px}

/* Agent frame */
.agent-frame{width:480px;background:linear-gradient(135deg,#FAFAFE,#F3E8FF);border-radius:20px;box-shadow:0 12px 48px rgba(0,0,0,.3);overflow:hidden;border:3px solid rgba(139,43,226,.3);padding:24px;max-height:560px;overflow-y:auto}
.sentinel-frame{width:480px;background:linear-gradient(135deg,#FFFDF5,#FFF8E1);border-radius:20px;box-shadow:0 12px 48px rgba(0,0,0,.3);overflow:hidden;border:3px solid rgba(230,81,0,.3);padding:24px;max-height:560px;overflow-y:auto}

/* Components */
.bb-card{background:var(--white);border:1px solid var(--gray-border);border-radius:4px;box-shadow:var(--shadow);padding:14px;margin-bottom:12px}
.bb-card-hdr{background:var(--gray-light);margin:-14px -14px 10px;padding:10px 14px;border-bottom:1px solid var(--gray-border);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.bb-table{width:100%;border-collapse:collapse;font-size:12px}
.bb-table th{text-align:left;padding:8px 12px;font-weight:600;font-size:11px;color:var(--gray);background:var(--gray-light);border-bottom:1px solid var(--gray-border)}
.bb-table td{padding:8px 12px;border-bottom:1px solid #f0f0f0}
.bb-btn{display:inline-block;padding:8px 16px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);border:none;transition:all .2s}
.bb-btn.primary{background:var(--blue);color:#fff}
.bb-btn.primary:hover{background:#003DA0}
.bb-btn.secondary{background:#fff;color:var(--blue);border:1px solid var(--blue)}
.bb-btn.text{background:none;color:var(--blue)}
.bb-btn.danger{background:var(--red);color:#fff}
.bb-btn.full{width:100%;text-align:center;display:block}
.bb-badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:600}
.bb-badge.high{background:#FFE8E5;color:var(--red)}.bb-badge.medium{background:#FFF8E1;color:#B45309}
.bb-badge.open{background:var(--blue-light);color:var(--blue)}.bb-badge.resolved{background:#E8F5E9;color:var(--green)}
.bb-input{width:100%;padding:8px 12px;border:1px solid #D0D0D0;border-radius:4px;font-size:12px;height:36px;background:var(--white);color:var(--gray-text);font-family:var(--font)}
.bb-label{font-size:11px;font-weight:600;color:var(--gray-text);margin-bottom:4px;display:block}
.bb-select{width:100%;padding:8px 12px;border:1px solid #D0D0D0;border-radius:4px;font-size:12px;height:36px;background:var(--white)}
.bb-textarea{width:100%;padding:8px 12px;border:1px solid #D0D0D0;border-radius:4px;font-size:12px;min-height:56px;font-family:var(--font);resize:none}
.bb-alert{padding:8px 12px;border-radius:4px;font-size:11px;font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.bb-alert.info{background:#E8F4FD;color:var(--blue)}.bb-alert.warning{background:#FFF3E0;color:var(--orange)}.bb-alert.success{background:#E8F5E9;color:var(--green)}.bb-alert.error{background:#FFE8E5;color:var(--red)}
.field-group{margin-bottom:12px}

/* Agent/Sentinel banners */
.agent-banner{background:linear-gradient(135deg,#F3E8FF,#E8F0FF);border:1px solid rgba(139,43,226,.2);border-radius:6px;padding:10px 12px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.agent-banner .ab-icon{font-size:18px}.agent-banner .ab-text{font-size:11px;font-weight:600;color:#6B21A8;flex:1}.agent-banner .ab-status{font-size:9px;font-weight:700;padding:3px 8px;border-radius:8px;background:rgba(139,43,226,.12);color:#6B21A8}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:3px solid rgba(139,43,226,.2);border-top-color:#6B21A8;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
.sentinel-banner{background:linear-gradient(135deg,#FFF8E1,#FFECB3);border:1px solid rgba(230,81,0,.2);border-radius:6px;padding:10px 12px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sentinel-banner .sb-icon{font-size:18px}.sentinel-banner .sb-text{font-size:11px;font-weight:600;color:#B45309;flex:1}.sentinel-banner .sb-status{font-size:9px;font-weight:700;padding:3px 8px;border-radius:8px;background:rgba(230,81,0,.12);color:var(--orange)}

/* Human review card */
.review-card{background:#FFFBEB;border:2px solid var(--amber);border-radius:6px;padding:12px;margin-bottom:10px}
.review-card .rc-hdr{font-size:12px;font-weight:700;color:#92400E;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.review-card .rc-body{font-size:11px;color:#78350F;line-height:1.5;margin-bottom:8px}

/* Transaction row */
.txn-row{padding:10px 12px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .2s}
.txn-row:hover{background:var(--blue-light)}
.txn-row.selected{background:var(--blue-light);border-left:3px solid var(--blue)}
.txn-name{font-size:13px;font-weight:600}.txn-date{font-size:10px;color:var(--gray);margin-top:1px}
.txn-amount{font-size:13px;font-weight:700;color:var(--red)}

/* Bottom nav */
.bottom-nav{background:rgba(0,0,0,.4);backdrop-filter:blur(12px);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-top:1px solid rgba(255,255,255,.06)}
.nav-btn{padding:8px 20px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);border:none;transition:all .2s}
.nav-btn.back{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15)}
.nav-btn.back:hover{background:rgba(255,255,255,.15)}
.nav-btn.next{background:var(--blue);color:#fff}
.nav-btn.next:hover{background:#003DA0}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.nav-info{color:rgba(255,255,255,.5);font-size:11px;font-weight:600}

/* Timeline dots */
.tl{margin:12px 0}
.tl-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:2px}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
.tl-dot.done{background:var(--green)}.tl-dot.current{background:var(--blue);box-shadow:0 0 0 3px rgba(0,82,204,.2)}.tl-dot.pending{background:var(--gray-border)}
.tl-line{width:2px;height:10px;background:var(--gray-border);margin-left:4px}
.tl-line.done{background:var(--green)}
.tl-text{font-size:11px}.tl-text.active{color:var(--blue);font-weight:700}
</style>
</head>
<body>

<script>

let cur = 0;
const area = document.getElementById('screen-area');
const pbar = document.getElementById('persona-bar');

function render(idx, dir) {
  const s = STEPS[idx];
  // Update persona bar
  pbar.className = 'persona-bar ' + s.type;
  document.getElementById('pb-avatar').innerHTML = AVATARS[s.avatar] || '';
  document.getElementById('pb-name').textContent = s.persona;
  document.getElementById('pb-role').textContent = s.role;
  document.getElementById('pb-title').textContent = s.title;
  document.getElementById('pb-subtitle').textContent = s.subtitle;
  // Step dots
  let dots = '';
  STEPS.forEach((_, i) => {
    dots += `<div class="sc-dot ${i < idx ? 'done' : i === idx ? 'current' : 'pending'}"></div>`;
  });
  document.getElementById('step-dots').innerHTML = dots;
  // Nav info
  document.getElementById('nav-info').textContent = `Step ${idx + 1} of ${STEPS.length}`;
  document.getElementById('btn-back').disabled = idx === 0;
  // Remove old frames + bullets
  const old = area.querySelector('.frame.active');
  if (old) {
    old.classList.remove('active');
    old.classList.add(dir === 'next' ? 'exit-left' : 'exit-right');
    setTimeout(() => old.remove(), 500);
  }
  const oldBp = area.querySelector('.bullets-panel');
  if (oldBp) { oldBp.classList.remove('show'); setTimeout(() => oldBp.remove(), 400); }

  // Add new frame (shifted left)
  const frame = document.createElement('div');
  frame.className = 'frame' + (dir === 'back' ? ' from-left' : '');
  frame.style.marginRight = '340px';
  frame.innerHTML = s.html;
  area.appendChild(frame);
  requestAnimationFrame(() => requestAnimationFrame(() => frame.classList.add('active')));

  // Add bullet points panel
  if (s.bullets && s.bullets.length) {
    const bp = document.createElement('div');
    bp.className = 'bullets-panel';
    let bhtml = '<div class="bp-title">How it works</div>';
    s.bullets.forEach(b => {
      bhtml += `<div class="bp-item"><div class="bp-dot ${b.color}"></div><div>${b.text}</div></div>`;
    });
    bp.innerHTML = bhtml;
    area.appendChild(bp);
    setTimeout(() => bp.classList.add('show'), 200);
  }
}

function next() { if (cur < STEPS.length - 1) { cur++; render(cur, 'next'); } }
function prev() { if (cur > 0) { cur--; render(cur, 'back'); } }

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') next();
  if (e.key === 'ArrowLeft') prev();
});

// Initial render
render(0, 'next');
</script>
